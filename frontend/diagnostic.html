<!DOCTYPE html>
<html>
<head>
<title>System Diagnostic</title>
<style>
body { font-family: Arial; margin: 20px; background: #f5f5f5; }
.status { padding: 15px; margin: 10px 0; border-radius: 5px; }
.ok { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
.pending { background: #fff3cd; color: #856404; border: 1px solid #ffeaa7; }
h2 { color: #333; }
code { background: #f0f0f0; padding: 2px 5px; border-radius: 3px; }
</style>
</head>
<body>

<h1>🔧 System Diagnostic</h1>

<div id="diagnose"></div>

<script>
const BACKEND_URL = "http://127.0.0.1:5000";
const FRONTEND_URL = "http://127.0.0.1:8000";

async function runDiagnostics() {
  const diagDiv = document.getElementById("diagnose");
  let html = "";

  // Test 1: Frontend server
  html += await testEndpoint(
    "Frontend Server",
    FRONTEND_URL + "/",
    "GET"
  );

  // Test 2: Backend health
  html += await testEndpoint(
    "Backend Health",
    BACKEND_URL + "/health",
    "GET"
  );

  // Test 3: Send OTP
  html += await testEndpoint(
    "Backend Send OTP",
    BACKEND_URL + "/send-otp",
    "POST",
    { name: "Test", number: "1234567890" }
  );

  // Test 4: File serving
  html += await testEndpoint(
    "Backend File Serving",
    BACKEND_URL + "/uploads/test.txt",
    "GET"
  );

  diagDiv.innerHTML = html;
}

async function testEndpoint(name, url, method, body = null) {
  try {
    const options = {
      method: method,
      headers: { "Content-Type": "application/json" }
    };
    if (body) {
      options.body = JSON.stringify(body);
    }

    const response = await fetch(url, options);
    const status = response.status;
    const statusClass = status === 200 || status === 404 ? "ok" : "error";
    
    return `
      <div class="status ${statusClass}">
        <strong>✓ ${name}</strong><br>
        URL: <code>${url}</code><br>
        Status: <strong>${status}</strong> ${status === 200 ? "✓" : status === 404 ? "(File not found - expected)" : "✗"}
      </div>
    `;
  } catch (err) {
    return `
      <div class="status error">
        <strong>✗ ${name}</strong><br>
        URL: <code>${url}</code><br>
        Error: <strong>${err.message}</strong>
      </div>
    `;
  }
}

// Run diagnostics on page load
window.addEventListener("load", runDiagnostics);

// Add refresh button
document.write(`
<button onclick="location.reload()" style="padding: 10px 20px; margin: 10px 0; font-size: 16px;">
  🔄 Refresh Test
</button>
<hr>
<h3>📝 How to Test:</h3>
<ol>
  <li>Make sure both servers are running:
    <ul>
      <li>Backend: <code>python app.py</code> (port 5000)</li>
      <li>Frontend: <code>python frontend_server.py</code> (port 8000)</li>
    </ul>
  </li>
  <li>Open this page: <code>http://127.0.0.1:8000/diagnostic.html</code></li>
  <li>All checks should show ✓ status</li>
  <li>Then test login at: <code>http://127.0.0.1:8000/login.html</code></li>
</ol>
`);
</script>

</body>
</html>
